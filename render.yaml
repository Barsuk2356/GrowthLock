services:
  - type: web
    name: growthlock
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    disk:
      name: growthlock-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DB_FILE
        value: /var/data/growthlock-db.json
      - key: AUTH_SECRET
        generateValue: true
      - key: AI_PROVIDER
        value: openrouter
      - key: OPENROUTER_MODEL
        value: openai/gpt-oss-20b:free
      - key: OPENROUTER_FALLBACK_MODELS
        value: meta-llama/llama-3.2-3b-instruct:free,qwen/qwen3-next-80b-a3b-instruct:free,google/gemma-4-26b-a4b-it:free,openai/gpt-oss-120b:free
      # Добавь OPENROUTER_API_KEY вручную в Render Environment Variables
